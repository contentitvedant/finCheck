<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>finCheck — Transaction Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--surface3:#1e1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#6c63ff;--accent2:#a78bfa;--accent3:#38bdf8;
  --green:#34d399;--red:#f87171;--amber:#fbbf24;
  --text:#f0f0f8;--text2:#9090a8;--text3:#5a5a72;
  --radius:12px;--radius-sm:8px;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

.shell{min-height:100vh;display:flex;flex-direction:column;max-width:1280px;margin:0 auto;padding:0 24px 40px}

/* Page title */
.page-title-bar{text-align:center;padding:10px 0 6px;font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;gap:16px;flex-wrap:wrap}
.logo{font-family:var(--display);font-weight:800;font-size:22px;letter-spacing:-0.5px;color:var(--text);display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px}
.search-box input{background:transparent;border:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--text);width:160px}
.search-box input::placeholder{color:var(--text3)}
.search-icon{color:var(--text3);font-size:14px}
.cid-lookup{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px}
.cid-lookup input{background:transparent;border:none;outline:none;font-family:var(--mono);font-size:12px;color:var(--accent2);width:130px}
.cid-lookup input::placeholder{color:var(--text3)}
.btn-find{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-family:var(--display);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:background .15s,transform .1s}
.btn-find:hover{background:#5b52ee;transform:translateY(-1px)}
.btn-find:active{transform:translateY(0)}
.btn-clear{background:transparent;color:var(--red);border:1px solid rgba(248,113,113,.3);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--sans);display:none;transition:background .15s}
.btn-clear:hover{background:rgba(248,113,113,.1)}

/* Date filter bar */
.date-filter-bar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;flex-wrap:wrap}
.date-filter-bar label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-family:var(--display);margin-right:2px}

/* Date input trigger */
.date-inp-wrap{position:relative;display:inline-flex;align-items:center}
.date-inp{
  background:var(--surface3);border:1px solid var(--border2);border-radius:6px;
  padding:6px 32px 6px 10px;color:var(--text);font-family:var(--mono);font-size:12px;
  outline:none;cursor:pointer;transition:border-color .2s;user-select:none;
  width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.date-inp:focus,.date-inp.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(108,99,255,.2)}
.date-inp-icon{position:absolute;right:8px;font-size:12px;pointer-events:none;opacity:.55}
.date-sep{color:var(--text3);font-size:13px}

/* Calendar PORTAL — appended to body, position:fixed, never clips */
.cal-portal{
  position:fixed;z-index:99999;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);box-shadow:0 16px 48px rgba(0,0,0,.85);
  padding:14px;width:264px;
  display:none;
}
.cal-portal.open{display:block}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{
  background:var(--surface3);border:1px solid var(--border2);color:var(--text2);
  border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:16px;line-height:1;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  flex-shrink:0;
}
.cal-nav-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.cal-nav-btn[disabled]{opacity:.2;cursor:default;pointer-events:none}
.cal-month-lbl{font-family:var(--display);font-weight:700;font-size:13px;color:var(--text);text-align:center;flex:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.cal-dow{font-family:var(--display);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);text-align:center;padding:3px 0 6px}
.cal-day{
  text-align:center;padding:6px 2px;border-radius:6px;font-family:var(--mono);
  font-size:12px;color:var(--text2);cursor:pointer;transition:all .1s;
  border:1px solid transparent;line-height:1.2;
}
.cal-day:hover:not(.cal-empty):not(.cal-future){background:rgba(108,99,255,.2);color:var(--text);border-color:rgba(108,99,255,.4)}
.cal-day.cal-today{color:var(--accent2);font-weight:700;border-color:rgba(167,139,250,.35)}
.cal-day.cal-selected{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.cal-day.cal-inrange{background:rgba(108,99,255,.13);color:var(--text)}
.cal-day.cal-future{color:var(--text3);opacity:.3;cursor:default}
.cal-day.cal-empty{cursor:default;pointer-events:none}
.cal-footer{display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border)}
.cal-foot-btn{font-size:11px;color:var(--accent2);cursor:pointer;font-family:var(--mono);background:none;border:none;padding:2px 4px;border-radius:4px;transition:color .1s}
.cal-foot-btn:hover{color:var(--text)}

/* Quick buttons */
.btn-apply{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:6px;padding:6px 16px;font-family:var(--display);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:opacity .15s,transform .1s}
.btn-apply:hover{opacity:.88;transform:translateY(-1px)}
.btn-reset-date{background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:color .15s}
.btn-reset-date:hover{color:var(--text)}
.date-quick{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.qbtn{background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .15s}
.qbtn:hover,.qbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Main grid */
.grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}

/* Table card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2)}
.card-title{font-family:var(--display);font-weight:700;font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.badge-count{background:var(--surface3);border:1px solid var(--border2);border-radius:20px;padding:2px 8px;font-size:11px;font-family:var(--mono);color:var(--accent2)}
.filter-badge{display:none;align-items:center;gap:5px;background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-family:var(--mono);color:var(--accent2)}
.card-actions{display:flex;align-items:center;gap:8px}
.btn-dl{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-dl:hover{color:var(--text);background:var(--surface3)}
.btn-dl-html{display:flex;align-items:center;gap:5px;background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.3);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--accent2);cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-dl-html:hover{background:rgba(108,99,255,.22);color:#fff}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;font-family:var(--display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
tbody td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text2);transition:background .1s}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.03);color:var(--text)}
.cid-cell{font-family:var(--mono);font-size:12px;color:var(--accent2)!important;cursor:pointer;font-weight:500;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(167,139,250,.3);transition:color .15s}
.cid-cell:hover{color:var(--accent)!important;text-decoration-color:var(--accent)}
.hi-row td{background:rgba(108,99,255,.08)!important;color:var(--text)!important}
.age-cell{font-family:var(--mono);font-size:12px}
.gender-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--mono)}
.gender-pill.m{background:rgba(56,189,248,.1);color:var(--accent3);border:1px solid rgba(56,189,248,.2)}
.gender-pill.f{background:rgba(167,139,250,.1);color:var(--accent2);border:1px solid rgba(167,139,250,.2)}
.gender-pill.o{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.date-cell{font-family:var(--mono);font-size:11px;color:var(--text3)!important}
.txn-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--mono);font-weight:500}
.txn-pill.debit{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.txn-pill.credit{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.txn-pill.transfer{background:rgba(56,189,248,.12);color:var(--accent3);border:1px solid rgba(56,189,248,.25)}
.txn-pill.refund{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.txn-pill.withdrawal{background:rgba(248,113,113,.08);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.txn-pill.deposit{background:rgba(52,211,153,.08);color:#6ee7b7;border:1px solid rgba(110,231,183,.25)}
.txn-pill.payment{background:rgba(167,139,250,.12);color:var(--accent2);border:1px solid rgba(167,139,250,.25)}
.txn-pill.reversal{background:rgba(148,163,184,.12);color:#94a3b8;border:1px solid rgba(148,163,184,.25)}
.empty-state{text-align:center;padding:40px 14px;color:var(--text3);font-size:13px}

/* Pagination */
.pag{display:flex;align-items:center;gap:4px;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface2);flex-wrap:wrap}
.pag-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;font-family:var(--mono);color:var(--text2);cursor:pointer;transition:all .15s}
.pag-btn:hover{background:var(--surface3);color:var(--text)}
.pag-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pag-btn:disabled{opacity:.3;cursor:default}
.pag-info{font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:auto}

/* Form card — overflow:visible so age dropdown is never clipped */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:visible;position:sticky;top:20px}
.form-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2);border-radius:var(--radius) var(--radius) 0 0}
.form-title{font-family:var(--display);font-weight:700;font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.form-subtitle{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.form-body{padding:18px}

.field{margin-bottom:16px}
.field-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:var(--display);margin-bottom:6px}
.field input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.field input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.15)}
.field input[type=text]::placeholder{color:var(--text3)}

/* Age dropdown */
.dd-wrap{position:relative}
.dd-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-family:var(--sans);font-size:13px;color:var(--text);cursor:pointer;transition:border-color .2s;user-select:none}
.dd-trigger:hover{border-color:rgba(255,255,255,.2)}
.dd-trigger.open{border-color:var(--accent)}
.dd-arrow{color:var(--text3);font-size:11px;transition:transform .2s}
.dd-trigger.open .dd-arrow{transform:rotate(180deg)}
.dd-panel{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);z-index:9000;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.dd-panel.open{display:block}
.dd-search-wrap{padding:8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface2)}
.dd-search-inp{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none}
.dd-search-inp:focus{border-color:var(--accent)}
.dd-search-inp::placeholder{color:var(--text3)}
.dd-list{max-height:160px;overflow-y:auto}
.dd-list::-webkit-scrollbar{width:4px}
.dd-list::-webkit-scrollbar-track{background:transparent}
.dd-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.dd-opt{padding:7px 12px;font-family:var(--mono);font-size:13px;color:var(--text2);cursor:pointer;transition:background .1s,color .1s}
.dd-opt:hover{background:rgba(108,99,255,.1);color:var(--text)}
.dd-opt.sel{background:rgba(108,99,255,.15);color:var(--accent2)}
.dd-empty{padding:12px;text-align:center;font-size:12px;color:var(--text3);font-family:var(--mono)}

/* Gender */
.radio-group{display:flex;gap:8px}
.radio-label{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 6px;font-size:12px;cursor:pointer;transition:all .15s;user-select:none;font-family:var(--sans);color:var(--text2)}
.radio-label input[type=radio]{display:none}
.radio-label:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.radio-label.checked-m{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.4);color:var(--accent3)}
.radio-label.checked-f{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);color:var(--accent2)}
.radio-label.checked-o{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4);color:var(--amber)}

/* Photo */
.photo-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:18px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden}
.photo-zone:hover{border-color:var(--accent);background:rgba(108,99,255,.05)}
.photo-zone.has-photo{border-color:var(--green);background:rgba(52,211,153,.05)}
.photo-preview{width:60px;height:60px;border-radius:50%;object-fit:cover;display:none;margin:0 auto 8px}
.photo-zone.has-photo .photo-preview{display:block}
.photo-zone.has-photo .photo-icon{display:none}
.photo-icon{font-size:24px;margin-bottom:6px}
.photo-label{font-size:12px;color:var(--text2);font-family:var(--sans)}
.photo-sublabel{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* Submit */
.submit-wrap{margin-top:4px}
.btn-submit{width:100%;padding:11px;border-radius:var(--radius-sm);font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:.5px;cursor:not-allowed;background:var(--surface3);color:var(--text3);border:1px solid var(--border2);transition:all .2s}
.btn-submit.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;border-color:transparent;box-shadow:0 4px 20px rgba(108,99,255,.4)}
.btn-submit.on:hover{opacity:.9;transform:translateY(-1px)}
.submit-status{display:flex;align-items:center;gap:6px;margin-top:8px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.status-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.submit-status span{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px}
.stat-val{font-family:var(--display);font-size:26px;font-weight:800;color:var(--text);letter-spacing:-1px}
.stat-lbl{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-delta{font-size:10px;font-family:var(--mono);color:var(--green);margin-top:2px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@keyframes statFlash{0%{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.25)}100%{border-color:var(--border);box-shadow:none}}
.stat-card.stat-flash{animation:statFlash .5s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes calIn{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.card,.form-card,.date-filter-bar,.stats-row{animation:fadeUp .4s ease both}
.stats-row{animation-delay:.05s}
.date-filter-bar{animation-delay:.1s}
.grid{animation:fadeUp .4s ease .15s both}
.cal-portal.open{animation:calIn .15s ease}
</style>
</head>
<body>

<!-- Calendar portals — live at body level, never clipped by any parent -->
<div class="cal-portal" id="cal-from" role="dialog" aria-label="Pick start date"></div>
<div class="cal-portal" id="cal-to"   role="dialog" aria-label="Pick end date"></div>

<div class="shell">

  <div class="page-title-bar">finCheck · Banking Transaction Dashboard</div>

  <header>
    <div class="logo"><div class="logo-dot"></div>finCheck</div>
    <div class="header-right">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-inp" placeholder="Search transactions…" oninput="filterTable()">
      </div>
      <div class="cid-lookup">
        <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">#</span>
        <input type="text" id="cid-inp" placeholder="Customer ID e.g. C004">
        <button class="btn-find" onclick="lookupCID()">Find</button>
        <button class="btn-clear" id="btn-clear" onclick="clearCID()">✕ Clear</button>
      </div>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-lbl">Total Records</div>
      <div class="stat-delta" id="stat-filtered"></div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-avg-age">—</div>
      <div class="stat-lbl">Avg Age</div>
      <div class="stat-delta" id="stat-avg-delta">in view</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-date-range">—</div>
      <div class="stat-lbl">Date Range</div>
      <div class="stat-delta" id="stat-range-lbl">all time</div>
    </div>

<script>
'use strict';

/* ─────────────────────────────────────────────
   DATE HELPERS  — 100% local time, no UTC
───────────────────────────────────────────── */
function fmtDate(y,m,d){
  return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}
function localToday(){
  const n=new Date();
  return fmtDate(n.getFullYear(),n.getMonth()+1,n.getDate());
}
function localDateFromMs(ts){
  const d=new Date(ts);
  return fmtDate(d.getFullYear(),d.getMonth()+1,d.getDate());
}

/* ─────────────────────────────────────────────
   DATA SEED  — 365 days, one record per day
───────────────────────────────────────────── */
const NAMES=[
  'Ishaan Rao','Uday Gupta','Suresh Pillai','Sachin Desai','Taruna Joshi',
  'Qasim Khanna','Meera Singh','Ritika Verma','Arjun Chopra','Jyoti Patel',
  'Ananya Mishra','Vikram Verma','Taruna Patel','Sachin Mishra','Wasim Mishra',
  'Lakshmi Bose','Deepak Bose','Deepak Gupta','Harsha Reddy','Suresh Menon',
  'Vandana Yadav','Kunal Shah','Lakshmi Das','Priya Nair','Nisha Tiwari',
  'Asha Yadav','Preeti Mehta','Nikhil Tiwari','Pallavi Shah','Sneha Desai',
  'Vinod Gupta','Priya Chauhan','Kunal Bose','Rahul Pandey','Yash Mehta',
  'Nikhil Mishra','Priya Pillai','Wasim Khanna','Sneha Pandey','Taruna Sharma',
  'Deepak Pillai','Yash Chopra','Xena Mishra','Rahul Yadav','Preeti Pandey',
  'Ananya Shetty','Neha Das','Sneha Saxena','Suresh Bose','Wasim Kumar',
  'Divya Nair','Ananya Iyer','Sanjay Shetty','Asha Iyer','Rohit Khanna',
  'Taruna Shah','Asha Mehta','Rajesh Desai','Neha Chopra','Deepak Kapoor'
];
const GENDERS=['Male','Female','Other'];
function assignGender(i){
  // Deterministic per CID index, well distributed: ~45% M, ~45% F, ~10% O
  const h=(i*31+17)%100;
  if(h<45)return'Male';
  if(h<90)return'Female';
  return'Other';
}
const CHANNELS=['Debit','Credit','Transfer','Refund','Withdrawal','Deposit','Payment','Reversal'];

(function buildSeed(){
  const now=new Date();
  const y0=now.getFullYear(),m0=now.getMonth(),d0=now.getDate();
  const seed=[];
  for(let i=364;i>=0;i--){
    const d=new Date(y0,m0,d0-i);
    seed.push({
      cid:'C'+String(365-i).padStart(3,'0'),
      name:NAMES[i%NAMES.length],
      age:18+((i*7+13)%52),
      gender:assignGender(i),
      comm:CHANNELS[i%CHANNELS.length],
      date:fmtDate(d.getFullYear(),d.getMonth()+1,d.getDate())
    });
  }
  window.SEED=seed;
})();

let allData=[...SEED], filtered=[...SEED];
let curPage=1;
const PAGE=10;
let hlCID=null, selAge=null, selGender=null, photoUploaded=false;
let dateFrom=null, dateTo=null;   /* YYYY-MM-DD strings */
let fileInputId='im1234';

/* ─────────────────────────────────────────────
   CALENDAR ENGINE
   Portals live at <body> — zero nesting issues.
   Closed on ANY scroll anywhere (clean UX).
───────────────────────────────────────────── */
const CAL_MONTHS=['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
const CAL_DAYS=['Mo','Tu','We','Th','Fr','Sa','Su'];
let openCal=null;   /* 'from' | 'to' | null */
let calView={from:{y:0,m:0}, to:{y:0,m:0}};

(function initCalView(){
  const n=new Date();
  calView.from={y:n.getFullYear(),m:n.getMonth()};
  calView.to  ={y:n.getFullYear(),m:n.getMonth()};
})();

function calOpen(which){
  /* If already open, close it */
  if(openCal===which){calClose();return;}
  /* Close any other open cal */
  calClose();

  /* Sync view to current selection */
  const val=which==='from'?dateFrom:dateTo;
  if(val){
    const[y,mo]=val.split('-').map(Number);
    calView[which]={y,m:mo-1};
  } else {
    const n=new Date();
    calView[which]={y:n.getFullYear(),m:n.getMonth()};
  }

  openCal=which;
  calRender(which);
  calPosition(which);
  document.getElementById('cal-'+which).classList.add('open');
}

function calClose(){
  if(!openCal)return;
  document.getElementById('cal-'+openCal).classList.remove('open');
  openCal=null;
}

function calPosition(which){
  const trigger=document.getElementById('wrap-'+which);
  const popup=document.getElementById('cal-'+which);
  if(!trigger||!popup)return;

  const rect=trigger.getBoundingClientRect();
  const POP_W=264, POP_H=300, GAP=6;

  let left=rect.left;
  let top=rect.bottom+GAP;

  /* Don't overflow right edge */
  if(left+POP_W>window.innerWidth-8) left=Math.max(8,window.innerWidth-POP_W-8);
  /* Don't overflow bottom — flip above if needed */
  if(top+POP_H>window.innerHeight-8) top=Math.max(8,rect.top-POP_H-GAP);

  popup.style.left=left+'px';
  popup.style.top =top+'px';
}

function calRender(which){
  const popup=document.getElementById('cal-'+which);
  const {y,m}=calView[which];
  const today=localToday();
  const[tY,tM]=today.split('-').map(Number);

  const prevDisabled=(y<2020||(y===2020&&m===0));
  const nextDisabled=(y>tY)||(y===tY&&m>=tM-1);

  const firstDow=new Date(y,m,1).getDay(); /* 0=Sun */
  const blanks=(firstDow+6)%7;             /* Mon-based offset */
  const daysInMo=new Date(y,m+1,0).getDate();

  let g='';
  CAL_DAYS.forEach(d=>{g+=`<div class="cal-dow">${d}</div>`;});
  for(let b=0;b<blanks;b++) g+='<div class="cal-empty"></div>';

  for(let d=1;d<=daysInMo;d++){
    const ds=fmtDate(y,m+1,d);
    const future=ds>today;
    const isToday=ds===today;
    const selFrom=dateFrom, selTo=dateTo;
    const isSel=(which==='from'&&ds===selFrom)||(which==='to'&&ds===selTo);
    const inRange=selFrom&&selTo&&ds>selFrom&&ds<selTo;
    let cls='cal-day';
    if(future)        cls+=' cal-future';
    else if(isSel)    cls+=' cal-selected';
    else if(inRange)  cls+=' cal-inrange';
    else if(isToday)  cls+=' cal-today';
    const handler=future?'':'onclick="calPick(\''+which+'\',\''+ds+'\')"';
    g+=`<div class="${cls}" ${handler}>${d}</div>`;
  }

  popup.innerHTML=`
    <div class="cal-nav">
      <button class="cal-nav-btn" ${prevDisabled?'disabled':''} onclick="calNav('${which}',-1)">‹</button>
      <span class="cal-month-lbl">${CAL_MONTHS[m]} ${y}</span>
      <button class="cal-nav-btn" ${nextDisabled?'disabled':''} onclick="calNav('${which}',1)">›</button>
    </div>
    <div class="cal-grid">${g}</div>
    <div class="cal-footer">
      <button class="cal-foot-btn" onclick="calClear('${which}')">Clear</button>
      <button class="cal-foot-btn" onclick="calPick('${which}','${today}')">Today</button>
    </div>`;
}

function calNav(which,dir){
  let{y,m}=calView[which];
  m+=dir;
  if(m>11){m=0;y++;}
  if(m<0) {m=11;y--;}
  const n=new Date();
  if(y>n.getFullYear()||(y===n.getFullYear()&&m>n.getMonth()))return;
  if(y<2020)return;
  calView[which]={y,m};
  calRender(which);
}

function calPick(which,ds){
  if(which==='from') dateFrom=ds;
  else               dateTo=ds;
  updateDateDisplays();
  calClose();
  /* Do NOT applyAll() here — user must click Apply */
}

function calClear(which){
  if(which==='from') dateFrom=null;
  else               dateTo=null;
  updateDateDisplays();
  calClose();
  /* Do NOT applyAll() here — user must click Apply */
}

function updateDateDisplays(){
  const fd=document.getElementById('date-from-display');
  const td=document.getElementById('date-to-display');
  fd.textContent=dateFrom||'YYYY-MM-DD';
  fd.classList.toggle('active',!!dateFrom);
  td.textContent=dateTo||'YYYY-MM-DD';
  td.classList.toggle('active',!!dateTo);
  /* Update stat label */
  document.getElementById('stat-range-lbl').textContent=
    (dateFrom||dateTo)?((dateFrom||'…')+' → '+(dateTo||'…')):'all time';
}

/* Close calendar on ANY scroll — the correct production behaviour */
window.addEventListener('scroll', calClose, true);

/* Close on outside click */
document.addEventListener('mousedown', function(e){
  if(!openCal)return;
  const popup=document.getElementById('cal-'+openCal);
  const wrap =document.getElementById('wrap-'+openCal);
  if(!popup.contains(e.target)&&!wrap.contains(e.target)) calClose();
}, true);

/* ─────────────────────────────────────────────
   DATE FILTER ACTIONS
───────────────────────────────────────────── */
function applyDateFilter(){
  calClose();
  const td=localToday();
  if(dateFrom&&dateFrom>td) dateFrom=td;
  if(dateTo  &&dateTo  >td) dateTo  =td;
  /* Swap if from > to */
  if(dateFrom&&dateTo&&dateFrom>dateTo){const tmp=dateFrom;dateFrom=dateTo;dateTo=tmp;}
  updateDateDisplays();
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  applyAll();
}

function resetDateFilter(){
  dateFrom=null; dateTo=null;
  updateDateDisplays();
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  applyAll();
}

function quickDate(days,btn){
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  const n=new Date();
  const y=n.getFullYear(),mo=n.getMonth(),d=n.getDate();
  const toD  =new Date(y,mo,d);
  const fromD=days===0?new Date(y,mo,d):new Date(y,mo,d-days);
  dateFrom=fmtDate(fromD.getFullYear(),fromD.getMonth()+1,fromD.getDate());
  dateTo  =fmtDate(toD.getFullYear(),  toD.getMonth()+1,  toD.getDate());
  calView.from={y:fromD.getFullYear(),m:fromD.getMonth()};
  calView.to  ={y:toD.getFullYear(),  m:toD.getMonth()};
  if(btn) btn.classList.add('active');
  updateDateDisplays();
  applyAll();
}

/* ─────────────────────────────────────────────
   AGE DROPDOWN
───────────────────────────────────────────── */
function buildAgeList(q=''){
  const list=document.getElementById('age-list');
  const ages=Array.from({length:100},(_,i)=>i+1).filter(a=>!q||String(a).startsWith(q));
  if(!ages.length){list.innerHTML='<div class="dd-empty">No match</div>';return;}
  list.innerHTML=ages.map(a=>`<div class="dd-opt${selAge===a?' sel':''}" onclick="pickAge(${a})">${a}</div>`).join('');
}
buildAgeList();

function toggleAge(){
  const p=document.getElementById('age-panel');

  p.classList.toggle('open',opening);

    document.getElementById('age-search').value='';
    buildAgeList();
    setTimeout(()=>document.getElementById('age-search').focus(),40);

}
function filterAge(){buildAgeList(document.getElementById('age-search').value.trim());}
function pickAge(a){
  selAge=a;
  document.getElementById('age-display-val').textContent=a;
  document.getElementById('age-panel').classList.remove('open');
  document.getElementById('age-trigger').classList.remove('open');

/* Single unified outside-click handler */
document.addEventListener('mousedown',function(e){
  if(!document.getElementById('age-dd').contains(e.target)){
    document.getElementById('age-panel').classList.remove('open');
    document.getElementById('age-trigger').classList.remove('open');

});

/* ─────────────────────────────────────────────
   GENDER
───────────────────────────────────────────── */
function pickGender(val,cls){
  selGender=val;
  ['m','f','o'].forEach(c=>{
    document.getElementById('rl-'+c).className='radio-label'+(c===cls?' checked-'+c:'');
  });

/* ─────────────────────────────────────────────
   PHOTO — Canvas rendered (visible in UI, just <canvas> in DevTools)
───────────────────────────────────────────── */
let _photoUploaded=false, _photoImg=null, _canvasHover=false;

function drawPhotoCanvas(hover){
  const cv=document.getElementById('photo-canvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth;
  const H=cv.clientHeight||160;
  if(!W||!H)return;

  const bsW=Math.round(W*dpr), bsH=Math.round(H*dpr);
  if(cv.width!==bsW||cv.height!==bsH){
    cv.width=bsW;
    cv.height=bsH;
  }
  // Always reset + re-apply DPR scale
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  // Label
  ctx.save();
  ctx.font='700 10px "Syne",sans-serif';
  ctx.fillStyle='#5a5a72';
  ctx.letterSpacing='1px';
  ctx.fillText('PHOTO OF USER',0,11);
  ctx.restore();

  // Zone rect (below label)
  const pad=2, zx=pad, zy=20, zw=W-pad*2, zh=H-22;
  ctx.save();
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(zx,zy,zw,zh,8);
  else{ ctx.moveTo(zx+8,zy);ctx.lineTo(zx+zw-8,zy);ctx.arcTo(zx+zw,zy,zx+zw,zy+8,8);ctx.lineTo(zx+zw,zy+zh-8);ctx.arcTo(zx+zw,zy+zh,zx+zw-8,zy+zh,8);ctx.lineTo(zx+8,zy+zh);ctx.arcTo(zx,zy+zh,zx,zy+zh-8,8);ctx.lineTo(zx,zy+8);ctx.arcTo(zx,zy,zx+8,zy,8);ctx.closePath(); }
  if(_photoUploaded){ ctx.fillStyle='rgba(52,211,153,0.07)'; }
  else if(hover){     ctx.fillStyle='rgba(108,99,255,0.08)'; }
  else{               ctx.fillStyle='rgba(255,255,255,0.02)'; }
  ctx.fill();
  ctx.setLineDash([5,4]);
  ctx.lineWidth=1.5;
  ctx.strokeStyle=_photoUploaded?'#34d399':hover?'#6c63ff':'rgba(255,255,255,0.15)';
  ctx.stroke();
  ctx.restore();

  const cx=zx+zw/2, cy=zy+zh/2;

  if(_photoUploaded&&_photoImg){
    const r=Math.min(zw,zh)*0.22;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy-10,r,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(_photoImg,cx-r,cy-10-r,r*2,r*2);
    ctx.restore();
    ctx.save();
    ctx.font='500 12px "DM Sans",sans-serif';
    ctx.fillStyle='#34d399';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('Photo uploaded ✓',cx,cy+r+10);
    ctx.restore();
  } else {
    // Emoji
    ctx.save();
    ctx.font='22px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('📷',cx,cy-16);
    ctx.restore();
    // Main text
    ctx.save();
    ctx.font='500 12px "DM Sans",sans-serif';
    ctx.fillStyle='#9090a8';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('Click to upload photo',cx,cy+6);
    ctx.restore();
    // Sub text
    ctx.save();
    ctx.font='10px "DM Mono",monospace';
    ctx.fillStyle='#5a5a72';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('JPG, PNG, WEBP · max 5MB',cx,cy+22);
    ctx.restore();
  }
}

let _fileInpEl=null;

(function initPhotoCanvas(){
  const cv=document.getElementById('photo-canvas');
  if(!cv)return;

  _fileInpEl=document.getElementById('fca819b2e3d74a1c9f056b');
  if(_fileInpEl) _fileInpEl.addEventListener('change',()=>handlePhoto(_fileInpEl));

  // Use ResizeObserver for fully dynamic resolution-aware redraws
  const ro=new ResizeObserver(()=>drawPhotoCanvas(_canvasHover));
  ro.observe(cv);

  cv.addEventListener('click',()=>_fileInpEl&&_fileInpEl.click());
  cv.addEventListener('mouseenter',()=>{_canvasHover=true;drawPhotoCanvas(true);});
  cv.addEventListener('mouseleave',()=>{_canvasHover=false;drawPhotoCanvas(false);});
  // Initial draw after layout settles
  requestAnimationFrame(()=>drawPhotoCanvas(false));
})();

function triggerUpload(){if(_fileInpEl)_fileInpEl.click();}
function handlePhoto(inp){
  if(!inp||!inp.files||!inp.files[0])return;
  _photoUploaded=true; photoUploaded=true;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{_photoImg=img;drawPhotoCanvas(_canvasHover);};
    img.src=ev.target.result;
  };
  r.readAsDataURL(inp.files[0]);
  checkSubmit();
}

function resetPhotoShadow(){
  _photoUploaded=false; photoUploaded=false; _photoImg=null;
  drawPhotoCanvas(false);
  if(_fileInpEl)_fileInpEl.value='';
}

/* ─────────────────────────────────────────────
   SUBMIT / FORM
───────────────────────────────────────────── */
function checkSubmit(){
  const name=document.getElementById('f-name').value.trim();
  const ok=!!(name&&selAge&&selGender&&photoUploaded);
  const btn=document.getElementById('btn-submit-txn');
  btn.disabled=!ok;
  btn.setAttribute('aria-disabled',String(!ok));
  btn.className='btn-submit'+(ok?' on':'');
  document.getElementById('status-dot').className='status-dot'+(ok?' on':'');
  if(ok){
    document.getElementById('status-text').textContent='Ready to save';
  } else {
    const m=[];
    if(!name)          m.push('name');
    if(!selAge)        m.push('age');
    if(!selGender)     m.push('gender');
    if(!photoUploaded) m.push('photo');
    document.getElementById('status-text').textContent='Missing: '+m.join(', ');
  }
}

function handleSubmit(){
  const name=document.getElementById('f-name').value.trim();
  const n=new Date(), cid='C'+String(allData.length+1).padStart(3,'0');
  allData.unshift({cid,name,age:selAge,gender:selGender,comm:'New',
                   date:fmtDate(n.getFullYear(),n.getMonth()+1,n.getDate())});
  hlCID=cid;
  applyAll();
  /* Reset */
  document.getElementById('f-name').value='';
  selAge=null; selGender=null; photoUploaded=false; fileInputId='im1234';
  document.getElementById('age-display-val').textContent='Select age';
  buildAgeList();
  ['m','f','o'].forEach(c=>document.getElementById('rl-'+c).className='radio-label');
  resetPhotoShadow();
  checkSubmit();
}

/* ─────────────────────────────────────────────
   FILTERING & TABLE
───────────────────────────────────────────── */
function applyAll(){
  const q=document.getElementById('search-inp').value.toLowerCase();
  filtered=allData.filter(r=>{
    const txt=[r.cid,r.name,String(r.age),r.gender,r.comm,r.date].join(' ').toLowerCase();
    if(!txt.includes(q))return false;
    if(dateFrom&&r.date<dateFrom)return false;
    if(dateTo  &&r.date>dateTo  )return false;
    return true;
  });
  curPage=1;
  updateStats(); renderTable(); renderPag();
}

function filterTable(){
  hlCID=null;
  document.getElementById('filter-badge').style.display='none';
  document.getElementById('btn-clear').style.display='none';
  applyAll();
}

const G={Male:'m',Female:'f',Other:'o'};
const TXN_CLS={'Debit':'debit','Credit':'credit','Transfer':'transfer','Refund':'refund','Withdrawal':'withdrawal','Deposit':'deposit','Payment':'payment','Reversal':'reversal'};
function renderTable(){
  const start=(curPage-1)*PAGE, slice=filtered.slice(start,start+PAGE);
  document.getElementById('badge-count').textContent=filtered.length;
  if(!slice.length){
    document.getElementById('tbl-body').innerHTML=
      '<tr><td colspan="6" class="empty-state">No records match your filters</td></tr>';
    return;
  }
  document.getElementById('tbl-body').innerHTML=slice.map(r=>`
    <tr class="${hlCID===r.cid?'hi-row':''}">
      <td class="cid-cell" onclick="clickCID('${r.cid}')">${r.cid}</td>
      <td>${r.name}</td>
      <td class="age-cell">${r.age}</td>
      <td><span class="gender-pill ${G[r.gender]||'o'}">${r.gender}</span></td>
      <td><span class="txn-pill ${TXN_CLS[r.comm]||'transfer'}">${r.comm}</span></td>
      <td class="date-cell">${r.date}</td>
    </tr>`).join('');
}

function renderPag(){
  const total=Math.ceil(filtered.length/PAGE)||1;
  let h=`<button class="pag-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>← Prev</button>`;
  const s=Math.max(1,curPage-2), e=Math.min(total,curPage+2);
  if(s>1){h+=`<button class="pag-btn" onclick="goPage(1)">1</button>`;if(s>2)h+='<span style="color:var(--text3);font-size:12px;padding:0 4px">…</span>';}
  for(let i=s;i<=e;i++) h+=`<button class="pag-btn${i===curPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if(e<total){if(e<total-1)h+='<span style="color:var(--text3);font-size:12px;padding:0 4px">…</span>';h+=`<button class="pag-btn" onclick="goPage(${total})">${total}</button>`;}
  h+=`<button class="pag-btn" onclick="goPage(${curPage+1})" ${curPage===total?'disabled':''}>Next →</button>`;
  h+=`<span class="pag-info">${(curPage-1)*PAGE+1}–${Math.min(curPage*PAGE,filtered.length)} of ${filtered.length}</span>`;
  document.getElementById('pag').innerHTML=h;
}

function goPage(p){const t=Math.ceil(filtered.length/PAGE)||1;if(p<1||p>t)return;curPage=p;renderTable();renderPag();}

let _avgAgeAnim=null;
function animateCount(el,toVal,suffix=''){
  if(_avgAgeAnim)cancelAnimationFrame(_avgAgeAnim);
  const fromVal=parseInt(el.textContent)||0;
  if(isNaN(toVal)){el.textContent='—';return;}
  if(fromVal===toVal){el.textContent=toVal+suffix;return;}
  const dur=420, start=performance.now();
  function step(now){
    const p=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(fromVal+(toVal-fromVal)*ease)+suffix;
    if(p<1)_avgAgeAnim=requestAnimationFrame(step);
    else el.textContent=toVal+suffix;
  }
  _avgAgeAnim=requestAnimationFrame(step);
}

function updateStats(){
  document.getElementById('stat-total').textContent=allData.length;
  document.getElementById('stat-filtered').textContent=filtered.length<allData.length?filtered.length+' in view':'all records';
  const avgEl=document.getElementById('stat-avg-age');
  const newAvg=filtered.length?Math.round(filtered.reduce((s,r)=>s+r.age,0)/filtered.length):NaN;
  animateCount(avgEl,newAvg);
  // flash the avg age card to signal update
  const card=avgEl.closest('.stat-card');
  if(card){card.classList.remove('stat-flash');void card.offsetWidth;card.classList.add('stat-flash');}
  const deltaEl=document.getElementById('stat-avg-delta');
  if(deltaEl){
    if(!filtered.length) deltaEl.textContent='no records';
    else if(filtered.length===allData.length) deltaEl.textContent='all '+allData.length+' records';
    else deltaEl.textContent='from '+filtered.length+' filtered';
  }
  document.getElementById('stat-date-range').textContent=filtered.length?filtered.length+' rec.':'—';
}

/* ─────────────────────────────────────────────
   CID LOOKUP
───────────────────────────────────────────── */
function clickCID(cid){document.getElementById('cid-inp').value=cid;lookupCID();}
function lookupCID(){
  const val=document.getElementById('cid-inp').value.trim().toUpperCase();
  if(!val)return;
  const found=allData.find(r=>r.cid===val);
  const badge=document.getElementById('filter-badge');
  const clr=document.getElementById('btn-clear');
  if(found){
    filtered=[found];hlCID=found.cid;curPage=1;
    badge.style.display='inline-flex';
    document.getElementById('filter-badge-txt').textContent=found.cid+' · '+found.name+' · Age '+found.age;
    clr.style.display='inline-flex';
  } else {
    filtered=[];hlCID=null;
    badge.style.display='inline-flex';
    document.getElementById('filter-badge-txt').textContent='"'+val+'" not found';
    clr.style.display='inline-flex';
  }
  updateStats();renderTable();renderPag();
}
function clearCID(){
  document.getElementById('cid-inp').value='';
  document.getElementById('filter-badge').style.display='none';
  document.getElementById('btn-clear').style.display='none';
  hlCID=null; applyAll();
}

   INIT
───────────────────────────────────────────── */
applyAll();
checkSubmit();
